syntax = "proto3";
package gcpc.v1;
option go_package = "gocache/api/gcpc/v1";

// EnvelopeV1 wraps every message on the wire.
// Framing: [4-byte big-endian length][serialized EnvelopeV1]
message EnvelopeV1 {
  uint32 version = 1; // protocol version, must be 1
  uint64 id      = 2; // correlation ID for request/response pairing
  oneof payload {
    RegisterV1       register        = 10;
    RegisterAckV1    register_ack    = 11;
    HealthCheckV1    health_check    = 20;
    HealthResponseV1 health_response = 21;
    ShutdownV1       shutdown        = 30;
    ShutdownAckV1    shutdown_ack    = 31;
    CommandRequestV1  command_request  = 40;
    CommandResponseV1 command_response = 41;
    HookRequestV1    hook_request    = 50;
    HookResponseV1   hook_response   = 51;
    ServerQueryV1         server_query          = 60;
    ServerQueryResponseV1 server_query_response = 61;
    EventSubscribeV1      event_subscribe       = 70;
    EventV1               event                 = 71;
  }
}

// RegisterV1 is sent by the plugin after connecting to announce capabilities.
message RegisterV1 {
  string name     = 1;
  string version  = 2;
  bool   critical = 3;
  repeated CommandDeclV1 commands = 4; // commands this plugin provides
  int32 priority = 5;                  // plugin priority (lower = higher priority)
  repeated HookDeclV1 hooks = 6;      // hooks this plugin wants to intercept
  repeated string requested_scopes = 7; // scopes the plugin requests (e.g. "read", "write", "hook:pre", "keys:prefix:*")
}

// CommandDeclV1 declares a single command a plugin can handle.
message CommandDeclV1 {
  string name       = 1; // command name, e.g. "PUBLISH" or "QUERY"
  bool   namespaced = 2; // true = REX (PLUGIN:CMD), false = main namespace
  int32  min_args   = 3;
  int32  max_args   = 4; // -1 = unlimited
  bool   readonly   = 5; // hint: command does not mutate state
}

// HookPhaseV1 specifies when a hook fires relative to command execution.
enum HookPhaseV1 {
  HOOK_PHASE_UNSPECIFIED = 0;
  HOOK_PHASE_PRE  = 1; // before command execution
  HOOK_PHASE_POST = 2; // after command execution
}

// HookDeclV1 declares a hook a plugin wants to intercept.
message HookDeclV1 {
  string      pattern = 1; // "SET", "GET", "*" (exact or wildcard)
  HookPhaseV1 phase   = 2; // when the hook fires
}

// RegisterAckV1 is the server's response to a RegisterV1 message.
message RegisterAckV1 {
  bool   accepted = 1;
  string reason   = 2;
  repeated string granted_scopes = 3; // scopes actually granted (intersection of requested and allowed)
}

// HealthCheckV1 is sent by the server periodically to verify plugin liveness.
message HealthCheckV1 {
  uint64 timestamp = 1;
}

// HealthResponseV1 is the plugin's reply to a HealthCheckV1.
message HealthResponseV1 {
  bool   ok     = 1;
  string status = 2;
}

// ShutdownV1 is sent by the server to request graceful plugin termination.
message ShutdownV1 {
  uint64 deadline_ns = 1;
}

// ShutdownAckV1 is the plugin's acknowledgement of a ShutdownV1 request.
message ShutdownAckV1 {}

// CommandRequestV1 is sent by the server to invoke a plugin command.
message CommandRequestV1 {
  string          command    = 1; // resolved command name (e.g. "PUBLISH")
  repeated string args       = 2; // command arguments as strings
  string          request_id = 3; // correlation ID for multiplexed responses
  map<string, string> metadata = 4; // REX metadata (bare keys, no shared.rex. prefix)
}

// CommandResponseV1 is the plugin's response to a CommandRequestV1.
message CommandResponseV1 {
  string   request_id = 1;
  ResultV1 result     = 2;
}

// HookRequestV1 is sent by the server when a hook fires.
message HookRequestV1 {
  string          request_id   = 1; // correlation ID
  HookPhaseV1     phase        = 2;
  string          command      = 3; // the command being hooked (e.g. "SET")
  repeated string args          = 4;
  string          result_value = 5; // post-hook only: serialized result
  string          result_error = 6; // post-hook only: error string if any
  map<string, string> context  = 7; // accumulated hook context (server + own namespace + shared)
  map<string, string> metadata = 8; // REX metadata (bare keys, no shared.rex. prefix)
}

// HookResponseV1 is the plugin's response to a HookRequestV1.
// Only required for critical plugin hooks (non-critical are fire-and-forget).
message HookResponseV1 {
  string request_id  = 1;
  bool   deny        = 2; // pre-hook only: true = abort the command
  string deny_reason = 3;
  map<string, string> context_values = 4; // pre-hook: values to add to command context
}

// ResultV1 is a recursive RESP-like value tree for command results.
message ResultV1 {
  oneof value {
    string        simple_string = 1; // RESP simple string (+OK)
    string        error         = 2; // RESP error (-ERR ...)
    int64         integer       = 3; // RESP integer (:42)
    string        bulk_string   = 4; // RESP bulk string ($...)
    bool          is_null       = 5; // RESP null
    double        double_val    = 6; // RESP3 double
    ResultArrayV1 array         = 7; // RESP array (*...)
    ResultMapV1   map_val       = 8; // RESP3 map
  }
}

// ResultArrayV1 holds an ordered list of results.
message ResultArrayV1 {
  repeated ResultV1 elements = 1;
}

// ResultMapV1 holds key-value pairs for RESP3 map responses.
message ResultMapV1 {
  repeated ResultEntryV1 entries = 1;
}

// ResultEntryV1 is a single key-value pair in a ResultMapV1.
message ResultEntryV1 {
  string   key   = 1;
  ResultV1 value = 2;
}

// ServerQueryV1 is sent by a plugin to query server state.
message ServerQueryV1 {
  string request_id = 1; // correlation ID for response matching
  string topic      = 2; // query topic: "health", "plugins", "stats"
}

// ServerQueryResponseV1 is the server's response to a ServerQueryV1.
message ServerQueryResponseV1 {
  string              request_id = 1;
  map<string, string> data       = 2; // topic-specific key-value data
  string              error      = 3; // non-empty if query failed
}

// EventSubscribeV1 is sent by a plugin to subscribe to server events.
// Can be sent multiple times to update the subscription.
message EventSubscribeV1 {
  repeated string types = 1; // event types to subscribe to (e.g. "command.post", "log.entry")
}

// EventV1 is sent by the server to subscribed plugins (fire-and-forget).
// Each event type has its own strongly-typed message in the oneof.
message EventV1 {
  string type       = 1; // event type string for subscription routing
  uint64 timestamp  = 2; // nanoseconds since epoch
  oneof data {
    CommandPreEventV1       command_pre        = 10;
    CommandPostEventV1      command_post       = 11;
    ConnectionOpenEventV1   connection_open    = 12;
    ConnectionCloseEventV1  connection_close   = 13;
    ServerStartEventV1      server_start       = 14;
    ServerShutdownEventV1   server_shutdown    = 15;
    PluginRegisteredEventV1 plugin_registered  = 16;
    PluginCrashedEventV1    plugin_crashed     = 17;
    PluginRestartedEventV1  plugin_restarted   = 18;
    ConfigReloadedEventV1   config_reloaded    = 19;
    AuthFailedEventV1       auth_failed        = 20;
    CacheEvictionEventV1    cache_eviction     = 21;
    LogEntryEventV1         log_entry          = 22;
  }
}

message CommandPreEventV1 {
  string          command  = 1;
  repeated string args     = 2;
  map<string, string> metadata = 3; // REX metadata (bare keys) if present
}

message CommandPostEventV1 {
  string          command    = 1;
  repeated string args       = 2;
  uint64          elapsed_ns = 3;
  string          result     = 4; // serialized result value
  string          error      = 5; // error string if any
  map<string, string> metadata = 6; // REX metadata (bare keys) if present
}

message ConnectionOpenEventV1 {
  string remote_addr = 1;
}

message ConnectionCloseEventV1 {
  string remote_addr = 1;
  uint64 duration_ns = 2;
}

message ServerStartEventV1 {
  string addr    = 1;
  string version = 2;
}

message ServerShutdownEventV1 {
  string reason = 1;
}

message PluginRegisteredEventV1 {
  string name     = 1;
  string version  = 2;
  bool   critical = 3;
}

message PluginCrashedEventV1 {
  string name     = 1;
  bool   critical = 2;
  string error    = 3;
}

message PluginRestartedEventV1 {
  string name          = 1;
  bool   critical      = 2;
  int32  restart_count = 3;
}

message ConfigReloadedEventV1 {
  string file = 1;
}

message AuthFailedEventV1 {
  string remote_addr = 1;
  string command     = 2;
}

message CacheEvictionEventV1 {
  string key    = 1;
  string reason = 2; // "lru", "memory"
}

message LogEntryEventV1 {
  string              level   = 1; // "debug", "info", "warn", "error", "fatal"
  string              message = 2;
  string              caller  = 3; // source file:line
  map<string, string> fields  = 4; // structured log fields
}
