name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25.5"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go vet
        run: go vet ./...

      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build all packages
        run: go build ./...

  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Unit tests
        run: go test -race -count=1 ./pkg/cache/... ./pkg/evaluator/... ./pkg/resp/... ./pkg/plugin/... ./pkg/blocking/... ./pkg/clientctx/... ./pkg/config/... ./pkg/engine/... ./pkg/persistence/... ./pkg/transaction/... ./pkg/watch/... ./pkg/workers/...

      - name: Integration tests
        run: go test -race -count=1 -v -run 'TestIT_' ./pkg/server/...

      - name: Full coverage
        run: |
          go test -race -coverprofile=coverage.out ./...
          echo "### Coverage by package" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | grep -E 'total:|^gocache/pkg/[^/]+\s' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  proto-check:
    name: Proto Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install protoc
        run: |
          PB_VERSION=34.1
          curl -sSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PB_VERSION}/protoc-${PB_VERSION}-linux-x86_64.zip" -o protoc.zip
          sudo unzip -o protoc.zip -d /usr/local bin/protoc 'include/*'
          rm protoc.zip
          protoc --version

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

      - name: Regenerate proto
        run: protoc --go_out=. --go_opt=paths=source_relative proto/gcpc/v1/gcpc.proto

      - name: Check for drift
        run: |
          if ! git diff --exit-code proto/gcpc/v1/gcpc.pb.go; then
            echo "::error::Generated proto code is out of date. Run 'task proto' and commit."
            exit 1
          fi
