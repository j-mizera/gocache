server:
  address: "0.0.0.0"
  port: 6379

persistence:
  snapshot_file: "snapshot.dat"
  snapshot_interval: 5m
  load_on_startup: true

memory:
  max_memory_mb: 1024
  eviction_policy: "lru"  # options: lru, random, none

workers:
  cleanup_interval: 1m

